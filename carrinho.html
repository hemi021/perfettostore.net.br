<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Meu Carrinho | Perfetto Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/carrinho.css">
</head>
<body>

<div id="menu-side" class="side-panel side-panel-right">
    <button class="close-panel" id="close-menu">&times;</button>
    <nav class="side-nav">
        <h3 class="menu-title">Categorias</h3>
        <a href="index.html">Início</a>
        <a href="vestidos/index.html">Vestidos</a>
        <a href="calcas/index.html">Calças</a>
        <hr class="menu-divider">
        <h3 class="menu-title">Meus Favoritos 💜</h3>
        <div id="lista-favoritos" class="fav-container"></div>
    </nav>
</div>

<header class="main-header">
    <div class="header-container header-layout-custom">
        <div class="nav-left">
            <a href="index.html" style="text-decoration:none; color:var(--lilac); font-weight:600;">
                <i class="fas fa-chevron-left"></i> Voltar
            </a>
        </div>

        <div class="nav-center">
            <div class="logo">
                <a href="index.html">Perfetto <span class="lilac">Store</span></a>
            </div>
        </div>

        <div class="nav-right">
            <button id="menu-toggle" class="hamburger-menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</header>

<main class="cart-main-content">
    <div class="container">
        <div class="cart-card">
            <h2 class="section-title">Meu Carrinho 🛍️</h2>
            
            <div id="itens-carrinho" class="cart-items-list">
                </div>

            <div class="cart-summary">
                <div class="summary-row total">
                    <span>Total do Pedido</span>
                    <span id="valor-total">R$ 0,00</span>
                </div>
                
                <button class="btn-checkout" onclick="finalizarCompra()">
                    FINALIZAR NO WHATSAPP <i class="fab fa-whatsapp"></i>
                </button>
                
                <a href="index.html" class="btn-continue">
                    <i class="fas fa-arrow-left"></i> Continuar Comprando
                </a>
            </div>
        </div>
    </div>
</main>

<script src="js/cart.js"></script>
<script src="js/script.js"></script>
</body>
</html>
