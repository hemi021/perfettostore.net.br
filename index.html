<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="img/PS/PS.png" type="image/png">
    <title>Perfetto Store | Oficial</title>
    
    <!-- Meta Tags -->
    <meta property="og:title" content="Perfetto Store 💜">
    <meta property="og:description" content="Moda feminina com elegância e leveza.">
    <meta property="og:image" content="../img/logo-da-loja.jpg"> 
    <meta property="og:url" content="https://perfettostore.net.br">

    <!-- Fonts & CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- Intro Animation -->
<div id="intro-perfetto">
    <div class="conteudo-intro">
        <h1 id="typing-text"></h1>
    </div>
</div>

<!-- Menu Lateral de Categorias -->
<div id="menu-side" class="side-panel">
    <button class="close-panel" id="close-menu">&times;</button>
    <nav class="side-nav">
        <h3 class="menu-title">Categorias</h3>
        <a href="../index.html">Início</a>
        <a href="../vestidos/index.html">Vestidos</a>
        <a href="../calcas/index.html">Calças</a>
        <a href="../saias/index.html">Saias</a>
        <a href="../blusas/index.html">Blusas</a>
        <a href="../conjuntos/index.html">Conjuntos</a>
    </nav>
    <div class="wishlist-container">
        <h3 class="wishlist-title">Meus Favoritos 💜</h3>
        <div id="lista-favoritos"></div>
    </div>
</div>

<!-- Background escuro comum -->
<div id="bg-overlay" class="dark-bg"></div>

<!-- HEADER -->
<header class="main-header">
    <div class="cart-box" id="cart-trigger">
        <span class="cart-icon">🛒</span>
        <span class="cart-count" id="cart-count">0</span>
    </div>

    <div class="header-container">
        <div class="nav-left">
            <button id="menu-toggle" class="hamburger">
                <span></span><span></span><span></span>
            </button>
            <div class="logo">
                <a href="../index.html" style="text-decoration: none; color: inherit;">
                    Perfetto <span class="lilac">Store</span>
                </a>
            </div>
        </div> 

        <div class="search-box" style="position: relative;"> 
            <input type="text" placeholder="Buscar produto..." id="search-in" autocomplete="off">
            <div id="search-results" class="search-suggestions"></div>
        </div>

        <div class="nav-right">
            <nav class="main-nav">
                <a href="../index.html">Início</a>
                <a href="https://wa.me/5547996302096" target="_blank">Contato</a>
                <a href="https://instagram.com/perfettostore.jlle" target="_blank">Instagram</a>
            </nav>
        </div>
    </div>
</header>

<main>
    <!-- Carrossel -->
    <section class="carousel">
        <div class="carousel-inner" id="carousel-container">
            <div class="slide"><img src="../img/banner/banner (2).png" alt="Banner (2)"></div>
            <div class="slide"><img src="../img/banner/banner1.png" alt="Banner 1"></div>
            <div class="slide"><img src="../img/banner/banner3.jpg" alt="Banner 3"></div>
        </div>
        <button class="arrow prev" id="prev-btn">&#10094;</button>
        <button class="arrow next" id="next-btn">&#10095;</button>
    </section>

    <!-- Parallax e Produtos seguem aqui (seu código original está mantido) -->
    <!-- ... (restante das seções de produtos) ... -->
</main>

<footer class="main-footer">
    <div class="footer-container">
        <div class="payments">
            <p>Formas de Pagamento</p>
            <div class="pay-row">
                <img src="../img/pagamentos/visa_PNG4.png" alt="Visa" class="pay-img">
                <img src="../img/pagamentos/master-card.png" alt="Mastercard" class="pay-img">
                <img src="../img/pagamentos/paypal.png" alt="PayPal" class="pay-img">
                <img src="../img/pagamentos/elo-png.png" alt="Elo" class="pay-img">
                <img src="../img/pagamentos/pixx.jpg" alt="pix" class="pay-img">
            </div>
        </div>
        <div class="legal">
            <p>CNPJ: 59.017.606/0001-82</p>
            <p>© 2026 Perfetto Store — Joinville/SC</p>
        </div>
    </div>
</footer>

<!-- ESTRUTURA DO CARRINHO (FORA DE TUDO PARA NÃO BUGAR) -->
<div id="cart-side" class="side-panel">
    <div class="side-header">
        <h3>Meu Carrinho 🛍️</h3>
        <button id="close-cart" class="close-btn">&times;</button>
    </div>
    
    <div id="cart-items-container" class="side-content">
        <!-- Itens aparecerão aqui via JS -->
    </div>

    <div class="cart-footer">
        <div class="total-box" style="display: flex; justify-content: space-between; font-weight: bold; padding: 10px 0;">
            <span>Total:</span>
            <span id="cart-total-value">R$ 0,00</span>
        </div>
        <button class="btn-checkout" onclick="finalizarCompra()">Finalizar Pedido</button>
    </div>
</div>

<!-- Overlay Único para o Carrinho -->
<div id="cart-overlay" class="bg-overlay"></div>

<!-- Scripts -->
<script src="https://sdk.mercadopago.com.br/js/v2"></script>
<script src="https://unpkg.com/scrollreveal"></script>
<script src="../js/script.js?v=3"></script>
</body>
</html>
