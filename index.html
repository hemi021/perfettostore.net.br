<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfetto Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="navbar">
  <div class="container">
    <div class="nav-inner">
      <span class="nav-logo" onclick="navigate('home')">Perfetto Store</span>
      <ul class="nav-links">
        <li><a href="#" class="active" onclick="navigate('home')">Home</a></li>
        <li><a href="#" onclick="navigate('conjuntos')">Conjuntos</a></li>
        <li><a href="#" onclick="navigate('blusas')">Blusas</a></li>
        <li><a href="#" onclick="navigate('shorts')">Shorts</a></li>
        <li><a href="#" onclick="navigate('saias')">Saias</a></li>
      </ul>
      <div class="nav-right">
        <button class="cart-btn" onclick="toggleCart()">
          🛍️ <span class="cart-badge" id="cart-badge">0</span>
        </button>
      </div>
    </div>
  </div>
</nav>

<div id="page-home" class="page active">
  <section class="hero">
    <div class="container">
      <h1>Perfetto Store</h1>
      <p>Moda feminina elegante e moderna</p>
    </div>
  </section>

  <section class="section container">
    <h2>Destaques</h2>
    <div class="products-grid" id="featured-grid"></div>
  </section>
</div>

<div id="page-conjuntos" class="page">
    <div class="container"><h2>Conjuntos</h2><div id="conjuntos-grid" class="products-grid"></div></div>
</div>
<div id="page-blusas" class="page">
    <div class="container"><h2>Blusas</h2><div id="blusas-grid" class="products-grid"></div></div>
</div>
<div id="page-shorts" class="page">
    <div class="container"><h2>Shorts</h2><div id="shorts-grid" class="products-grid"></div></div>
</div>
<div id="page-saias" class="page">
    <div class="container"><h2>Saias</h2><div id="saias-grid" class="products-grid"></div></div>
</div>

<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h3>Sua Sacola</h3>
    <button onclick="toggleCart()">X</button>
  </div>
  <div id="cart-items"></div>
  <div class="cart-footer">
    <button class="btn-primary" onclick="checkout()">Finalizar Compra</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
