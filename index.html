<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="img/PS/PS.png" type="image/png">
    <title>Perfetto Store | Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="menu-side" class="side-panel">
    <button class="close-panel" id="close-menu">&times;</button>
    <nav class="side-nav">
        <h3 class="menu-title">Categorias</h3>
        <a href="index.html">Início</a>
        <a href="vestidos/index.html">Vestidos</a>
        <a href="calcas/index.html">Calças</a>
        <a href="saias/index.html">Saias</a>
        <a href="blusas/index.html">Blusas</a> 
        <a href="conjuntos/index.html">Conjuntos</a>
        <hr class="menu-divider">
        <h3 class="menu-title">Meus Favoritos 💜</h3>
        <div id="lista-favoritos" class="fav-container"></div>
    </nav>
</div>

<header class="main-header">
    <div class="header-container">
        <div class="nav-left">
            <button id="menu-toggle" class="hamburger"><span></span><span></span><span></span></button>
            <div class="logo"><a href="index.html">Perfetto <span class="lilac">Store</span></a></div>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Buscar..." id="search-in">
        </div>
        <div class="nav-right">
            <div class="cart-box" onclick="toggleCart()">
                <span class="cart-icon">🛒</span>
                <span class="cart-count" id="cart-count">0</span>
            </div>
        </div>
    </div>
</header>

<main style="margin-top: 100px;">
    <section class="hero-home">
        <div class="container">
            <h1>Nova Coleção Perfetto</h1>
            <p>Onde a moda encontra a sua melhor versão.</p>
        </div>
    </section>

    <section class="products-section">
        <div class="container"> 
            <h2 class="section-title">Destaques 💜</h2>
            <div class="product-grid" id="home-products">
                <article class="card">
                    <button class="btn-fav"><i class="far fa-heart"></i></button>
                    <img src="img/bata.jpg" alt="Destaque" class="product-img">
                    <div class="card-content">
                        <h3>Cropped Amarração</h3>
                        <p class="price">R$ 59,90</p>
                        <button class="btn-buy" onclick="adicionarAoCarrinho('Cropped Amarração', 59.90, 'img/bata.jpg')">Eu quero</button>
                    </div>
                </article>
            </div> 
        </div> 
    </section>
</main>

<script src="js/script.js"></script>
</body>
</html>
