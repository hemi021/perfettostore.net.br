<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="img/PS.png" type="image/png">
    <title>Perfetto Store | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="intro-perfetto">
        <h1 id="typing-text"></h1>
    </div>

    <div id="menu-side" class="side-panel">
        <button class="close-panel" id="close-menu">&times;</button>
        <nav class="side-nav">
            <h3 class="menu-title">Categorias</h3>
            <a href="index.html">Início</a>
            <a href="vestidos.html">Vestidos</a>
            <a href="calcas.html">Calças</a>
            <h3 class="wishlist-title">Meus Favoritos 💜</h3>
            <div id="lista-favoritos"></div>
        </nav>
    </div>

    <div id="bg-overlay" class="dark-bg"></div>

    <header class="main-header">
        <div class="header-container">
            <div class="nav-left">
                <button id="menu-toggle" class="hamburger">
                    <span></span><span></span><span></span>
                </button>
                <div class="logo">Perfetto <span class="lilac">Store</span></div>
            </div>
            <div class="nav-right">
                <div class="cart-box" id="cart-trigger">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-count" id="cart-count">0</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="carousel">
            <div class="carousel-inner" id="carousel-container">
                <div class="slide"><img src="img/banner2.jpg" alt="Banner 1"></div>
                <div class="slide"><img src="img/banner3.jpg" alt="Banner 2"></div>
            </div>
            <button class="arrow prev" id="prev-btn">&#10094;</button>
            <button class="arrow next" id="next-btn">&#10095;</button>
        </section>

        <section class="hero">
            <div class="hero-container">
                <div class="hero-text">
                    <h1>Coleção <br>Perfetto 💜</h1>
                    <p>O melhor da moda feminina selecionado para você brilhar.</p>
                    <a href="#produtos" class="btn-buy" style="width: auto; text-decoration: none; display: inline-block;">Ver Looks</a>
                </div>
                <div class="hero-img">
                    <img src="img/roupalaranja.jpg" alt="Destaque">
                </div>
            </div>
        </section>

        <section class="products-section" id="produtos">
            <div class="container">
                <h2 style="text-align: center; margin-bottom: 30px;">Novas Peças 💜</h2>
                <div class="product-grid">
                    <article class="card">
                        <button class="btn-fav" onclick="toggleFavorito(this, 'Vestido Satin', '189,90', 'img/roupa2.jpg')"><i class="far fa-heart"></i></button>
                        <img src="img/roupa2.jpg" class="product-img">
                        <h3>Vestido Satin</h3>
                        <p class="price">R$ 189,90</p>
                        <button class="btn-buy" onclick="adicionarAoCarrinho('Vestido Satin', '189,90', 'img/roupa2.jpg', this)">Comprar</button>
                    </article>

                    <article class="card">
                        <button class="btn-fav" onclick="toggleFavorito(this, 'Cropped Amarração', '59,90', 'img/bata.jpg')"><i class="far fa-heart"></i></button>
                        <img src="img/bata.jpg" class="product-img">
                        <h3>Cropped Amarração</h3>
                        <p class="price">R$ 59,90</p>
                        <button class="btn-buy" onclick="adicionarAoCarrinho('Cropped Amarração', '59,90', 'img/bata.jpg', this)">Comprar</button>
                    </article>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p>© 2026 Perfetto Store — Joinville/SC</p>
        </div>
    </footer>

    <div id="modal-checkout" class="checkout-modal">
        <div class="modal-content">
            <button id="close-checkout" style="float:right; border:none; background:none; font-size:24px;">&times;</button>
            <div id="camada-carrinho">
                <h2>Seu Carrinho</h2>
                <div id="resumo-carrinho"></div>
                <div id="valor-total-modal"></div>
                <button id="ir-para-dados" class="btn-buy">Finalizar</button>
            </div>
        </div>
    </div>

    <script src="https://sdk.mercadopago.com.br/js/v2"></script>
    <script src="script.js"></script>
</body>
</html>
